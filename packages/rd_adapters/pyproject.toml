[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rd_adapters"
version = "0.1.0"
description = "Infrastructure adapters for RD project (storage, external services)"
requires-python = ">=3.11"
dependencies = [
    "rd_domain",
    "rd_pipeline",
    "boto3>=1.34.0",
]

[project.optional-dependencies]
async = [
    "aioboto3>=12.0.0",
]
all = [
    "rd_adapters[async]",
]

[tool.hatch.build.targets.wheel]
packages = ["rd_adapters"]
