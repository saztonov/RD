# Минимальная конфигурация для машин с 8GB RAM
# Использование: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# Суммарное потребление: ~2.5GB RAM
# - web: 384m
# - redis: 64m
# - worker: 2G (concurrency=1)

services:
  web:
    command: uvicorn apps.remote_ocr_server.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    restart: "no"
    mem_limit: 384m

  redis:
    ports:
      - "6379:6379"
    restart: "no"
    mem_limit: 64m

  # Минимальный worker для всех очередей
  worker:
    command: >
      celery -A apps.remote_ocr_server.celery_app worker
      -Q celery,ocr_meta,ocr_text,ocr_image,ocr_stamp
      --loglevel=info
      --concurrency=1
    volumes:
      - .:/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # Отключаем специализированные workers
  worker-meta:
    deploy:
      replicas: 0

  worker-text:
    deploy:
      replicas: 0

  worker-image:
    deploy:
      replicas: 0

  worker-stamp:
    deploy:
      replicas: 0
