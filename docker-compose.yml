services:
  web:
    build:
      context: .
      dockerfile: apps/remote_ocr_server/Dockerfile
    command: uvicorn apps.remote_ocr_server.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/apps --reload-dir /app/packages
    volumes:
      - ./apps:/app/apps
      - ./packages:/app/packages
    ports:
      - "${REMOTE_OCR_BIND_ADDR:-127.0.0.1}:${REMOTE_OCR_PORT:-18000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REMOTE_OCR_DATA_DIR=/data
      - PYTHONPATH=/app:/app/packages
      - WATCHFILES_FORCE_POLLING=1
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Legacy worker (обрабатывает очередь celery - старые задачи)
  worker:
    build:
      context: .
      dockerfile: apps/remote_ocr_server/Dockerfile
    command: celery -A apps.remote_ocr_server.celery_app worker -Q celery --loglevel=info --concurrency=1
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REMOTE_OCR_DATA_DIR=/data
      - PYTHONPATH=/app:/app/packages
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Координатор OCR задач (очередь ocr_meta)
  worker-meta:
    build:
      context: .
      dockerfile: apps/remote_ocr_server/Dockerfile
    command: celery -A apps.remote_ocr_server.celery_app worker -Q ocr_meta --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REMOTE_OCR_DATA_DIR=/data
      - PYTHONPATH=/app:/app/packages
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Обработка TEXT/TABLE блоков (очередь ocr_text)
  worker-text:
    build:
      context: .
      dockerfile: apps/remote_ocr_server/Dockerfile
    command: celery -A apps.remote_ocr_server.celery_app worker -Q ocr_text --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REMOTE_OCR_DATA_DIR=/data
      - PYTHONPATH=/app:/app/packages
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Обработка IMAGE блоков (очередь ocr_image)
  worker-image:
    build:
      context: .
      dockerfile: apps/remote_ocr_server/Dockerfile
    command: celery -A apps.remote_ocr_server.celery_app worker -Q ocr_image --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REMOTE_OCR_DATA_DIR=/data
      - PYTHONPATH=/app:/app/packages
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 3G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Обработка STAMP блоков (очередь ocr_stamp)
  worker-stamp:
    build:
      context: .
      dockerfile: apps/remote_ocr_server/Dockerfile
    command: celery -A apps.remote_ocr_server.celery_app worker -Q ocr_stamp --loglevel=info --concurrency=1
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REMOTE_OCR_DATA_DIR=/data
      - PYTHONPATH=/app:/app/packages
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  redis_data:
